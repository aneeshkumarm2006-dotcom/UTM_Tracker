<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Quote — UTM Snippet Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }
    .nav { background: #fff; border-bottom: 1px solid #ddd; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav h1 { font-size: 18px; color: #222; }
    .nav a { color: #6366f1; text-decoration: none; margin-left: 24px; font-weight: 500; }
    .container { max-width: 640px; margin: 40px auto; padding: 0 20px; padding-bottom: 80px; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 32px; margin-bottom: 24px; }
    .card h2 { font-size: 22px; margin-bottom: 8px; }
    .card p { color: #666; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #444; }
    .form-group input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; outline: none; transition: border 0.2s; }
    .form-group input:focus { border-color: #6366f1; }
    .submit-btn { background: #6366f1; color: white; border: none; padding: 12px 32px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background 0.2s; width: 100%; }
    .submit-btn:hover { background: #4f46e5; }

    .debug-panel { background: #1a1d27; color: #a5f3fc; border-radius: 12px; padding: 20px; font-family: 'Courier New', monospace; font-size: 13px; }
    .debug-panel h3 { color: #f1f5f9; margin-bottom: 12px; font-family: sans-serif; }
    .debug-panel .entry { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2a2d3a; }
    .debug-panel .key { color: #818cf8; }
    .debug-panel .value { color: #22c55e; }
    .debug-panel .empty { color: #64748b; font-style: italic; }

    .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d27; color: #f1f5f9; padding: 12px 24px; display: flex; align-items: center; gap: 12px; font-size: 13px; border-top: 1px solid #2a2d3a; z-index: 50; }
    .status-bar .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-bar .dot.green { background: #22c55e; }
    .status-bar .dot.yellow { background: #f59e0b; }
    .status-bar .dot.red { background: #ef4444; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-left: 8px; }
    .badge.trigger { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <nav class="nav">
    <h1>🧪 Test Site — Get a Quote <span class="badge trigger">TRIGGER PAGE</span></h1>
    <div>
      <a href="/test/snippet-test.html">Home</a>
      <a href="/test/get-a-quote.html">Get a Quote</a>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Get a Quote</h2>
      <p>Fill out this form and click Submit. The snippet will capture the field values plus UTM data from sessionStorage and send it to the tracking API.</p>

      <div class="form-group">
        <label for="wpforms-7209-field_1">Full Name</label>
        <input type="text" id="wpforms-7209-field_1" placeholder="e.g. Ravi Sharma">
      </div>
      <div class="form-group">
        <label for="wpforms-7209-field_2">Email</label>
        <input type="email" id="wpforms-7209-field_2" placeholder="e.g. ravi@example.com">
      </div>
      <div class="form-group">
        <label for="wpforms-7209-field_3">Phone</label>
        <input type="tel" id="wpforms-7209-field_3" placeholder="e.g. +91 98765 43210">
      </div>

      <button type="button" id="wpforms-submit-7209" class="submit-btn">Submit</button>
    </div>

    <div class="debug-panel">
      <h3>🔍 Debug: sessionStorage State</h3>
      <div id="debug-entries"><p class="empty">Loading...</p></div>
    </div>
  </div>

  <div class="status-bar">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Checking...</span>
  </div>

  <script>
    function updateDebug() {
      var keys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
      var html = '', hasAny = false;
      for (var i = 0; i < keys.length; i++) {
        var val = sessionStorage.getItem(keys[i]);
        if (val) hasAny = true;
        html += '<div class="entry"><span class="key">' + keys[i] + '</span><span class="' + (val ? 'value' : 'empty') + '">' + (val || '(empty)') + '</span></div>';
      }
      document.getElementById('debug-entries').innerHTML = html;
      var dot = document.getElementById('status-dot');
      var text = document.getElementById('status-text');
      if (hasAny) { dot.className = 'dot green'; text.textContent = 'UTM params in session ✓ — Fill the form and click Submit'; }
      else { dot.className = 'dot yellow'; text.textContent = 'No UTM params — go back to landing page with ?utm_source=google first'; }
    }
    updateDebug();
    setInterval(updateDebug, 1000);

    // Show feedback on submit
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('wpforms-submit-7209');
      if (btn) {
        btn.addEventListener('click', function() {
          setTimeout(function() {
            var dot = document.getElementById('status-dot');
            var text = document.getElementById('status-text');
            if (sessionStorage.getItem('utm_source')) {
              dot.className = 'dot green';
              text.textContent = '✅ Form submitted + conversion tracked! Check your dashboard.';
              btn.textContent = 'Submitted ✓';
              btn.style.background = '#22c55e';
            } else {
              dot.className = 'dot yellow';
              text.textContent = '⚠ Form submitted but no utm_source — snippet skipped (expected).';
            }
          }, 500);
        });
      }
    });
  </script>

  <!--
    =============================================
    PASTE YOUR GENERATED SNIPPET BELOW THIS LINE
    =============================================
    
    Dashboard config for this test page:
      Trigger Page: /test/get-a-quote.html
      Button ID:    wpforms-submit-7209
      Fields:
        name  → wpforms-7209-field_1
        email → wpforms-7209-field_2  
        phone → wpforms-7209-field_3
  -->

</body>
</html>
